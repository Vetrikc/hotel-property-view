spring:
    application:
        name: hotel-property-view

    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true
        properties:
            hibernate:
                format_sql: true

    liquibase:
        enabled: true
        change-log: classpath:db/changelog/db.changelog-master.yaml

    profiles:
        default: h2

server:
    port: 8092


springdoc:
    api-docs:
        path: /api-docs

    swagger-ui:
        path: /swagger-ui.html
        operations-sorter: method