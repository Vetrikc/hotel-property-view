databaseChangeLog:

  - changeSet:
      id: 1
      author: student

      changes:

        - createTable:
            tableName: hotels

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(5000)

              - column:
                  name: brand
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: house_number
                  type: INT

              - column:
                  name: street
                  type: VARCHAR(255)

              - column:
                  name: city
                  type: VARCHAR(255)

              - column:
                  name: country
                  type: VARCHAR(255)

              - column:
                  name: post_code
                  type: VARCHAR(30)

              - column:
                  name: phone
                  type: VARCHAR(100)

              - column:
                  name: email
                  type: VARCHAR(255)

              - column:
                  name: check_in
                  type: VARCHAR(20)

              - column:
                  name: check_out
                  type: VARCHAR(20)

  - changeSet:
      id: 2
      author: student

      changes:

        - createTable:
            tableName: amenities

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 3
      author: student

      changes:

        - createTable:
            tableName: hotel_amenities

            columns:

              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: amenity_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: hotel_amenities
            columnNames: hotel_id, amenity_id
            constraintName: pk_hotel_amenities

        - addForeignKeyConstraint:
            baseTableName: hotel_amenities
            baseColumnNames: hotel_id
            referencedTableName: hotels
            referencedColumnNames: id
            constraintName: fk_hotel_amenities_hotel

        - addForeignKeyConstraint:
            baseTableName: hotel_amenities
            baseColumnNames: amenity_id
            referencedTableName: amenities
            referencedColumnNames: id
            constraintName: fk_hotel_amenities_amenity